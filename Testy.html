<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles_login.css">
</head>
<body class="dark-background">
    <div class="login-container white-background black-text adjusted-padding">
        <h1 class="black-text">Login</h1>
        <form action="http://localhost/testy.php" method="post" class="form-container adjusted-padding">
            <div class="form-group left-align">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group left-align">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <input type="submit" value="Login">
                <a href="http://localhost/register.html">Account erstellen</a>
                <a href="#">Forgot your password?</a>
            </div>
        </form>
    </div>
</body>
</html>
