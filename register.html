<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrierung</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dark-mode.css">
    <link rel="stylesheet" href="lightmode.css">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="register.css">
    <script src="register.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const body = document.body;

            // Load dark mode setting from localStorage
            if (localStorage.getItem('darkMode') === 'enabled') {
                body.classList.add('dark-mode');
            } else {
                body.classList.remove('dark-mode');
            }
        });
    </script>
    <style>
        .container-outer {
            background-color: var(--background-color-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container-middle {
            background-color: var(--background-color-light);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .container-inner {
            background-color: var(--background-color-dark);
            padding: 20px;
            border-radius: 10px;
            color: var(--text-color-dark);
        }

        .container-inner label {
            color: var(--text-color-dark);
        }

        .container-inner p {
            color: var(--text-color-dark);
        }

        .container-inner input[type="text"],
        .container-inner input[type="email"],
        .container-inner input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background-color: var(--input-background-color-dark);
            color: var(--text-color-dark);
        }

        .container-inner input[type="submit"],
        .container-inner .return-button {
            background-color: var(--button-background-color-dark);
            color: var(--text-color-dark);
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 0;
        }

        .container-inner input[type="submit"]:hover,
        .container-inner .return-button:hover {
            background-color: var(--button-hover-background-color-dark);
        }
    </style>
</head>
<body>
    <div class="container-outer">
        <div class="container-middle">
            <h1 style="color: var(--text-color-light);">Registrierung</h1>
            <div class="container-inner">
                <form action="register.php" method="post" onsubmit="return validatePassword()" class="form-container">
                    <!-- Forname field -->
                    <div class="form-group">
                        <label for="forname">*Vorname:</label>
                        <input type="text" id="forname" name="forname" required>
                    </div>

                    <!-- Surname field -->
                    <div class="form-group">
                        <label for="surname">*Nachname:</label>
                        <input type="text" id="surname" name="surname" required>
                    </div>

                    <!-- Username field -->
                    <div class="form-group">
                        <label for="name">Benutzername:</label>
                        <input type="text" id="name" name="name" readonly>
                    </div>

                    <!-- Email field -->
                    <div class="form-group">
                        <label for="email">E-Mail:</label>
                        <input type="email" id="email" name="email">
                    </div>

                    <!-- Password field -->
                    <div class="form-group">
                        <label for="password">**Passwort:</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <!-- Confirm Password field -->
                    <div class="form-group">
                        <label for="password2">**Passwort wiederholen:</label>    
                        <input type="password" id="password2" name="password2" required>
                    </div>

                    <!-- Submit button -->
                    <div class="form-group">
                        <input type="submit" value="absenden">
                        <a href="testy.html" class="return-button">Zurück</a>
                    </div>

                    <!-- Required fields note -->
                    <p>* Pflichtfeld</p>
                    <p>** Passwort muss mindestens 9 Zeichen, einen Kleinbuchstaben, einen Großbuchstaben, eine Zahl und ein Sonderzeichen enthalten.</p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
