<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <h1>Registration</h1>
    
    <form action="register_process.php" method="post" onsubmit="return validatePassword()">
        <!-- Add CSRF token -->
        <input type="hidden" name="csrf_token" value="<?php echo htmlspecialchars($_SESSION['csrf_token']); ?>">

        <label for="forname">*Vorname:</label>
        <input type="text" id="forname" name="forname" required oninput="updateUsername()" pattern="[A-Za-z]+" title="The first name can only contain letters">
        <span><?php echo $forname_err; ?></span>

        <label for="surname">*Nachname:</label>
        <input type="text" id="surname" name="surname" required oninput="updateUsername()" pattern="[A-Za-z]+" title="The last name can only contain letters">
        <span><?php echo $surname_err; ?></span>

        <label for="name">Benutzername:</label>
        <input type="text" id="name" name="name" readonly>
        <span><?php echo $name_err; ?></span>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>

        <label for="password">**Password:</label>
        <input type="password" id="password" name="password" required>
        <span><?php echo $password_err; ?></span>

        <label for="password2">**Password wiederholen:</label>    
        <input type="password" id="password2" name="password2" required>

        <p>* Required field</p>
        <p>** Password must contain at least 9 characters, one lowercase letter, one uppercase letter, one number, and one special character.</p>

        <input type="submit" name="register" value="Submit">
        <button type="button" class="return-button" onclick="window.location.href='http://localhost/Testy.html'">Return</button>
    </form>

    <script src="register.js"></script>
</body>
</html>
